name: Python Tests

on:
  push:
    branches:
      - main
      - codex/**
      - salvage/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: CLI Smoke Test
        env:
          SMM_DB_PATH: ${{ runner.temp }}/drafts.db
        run: python3 cli.py version

      - name: Unit Tests
        run: python3 -m unittest discover -s tests -v
